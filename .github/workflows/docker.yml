name: build-image

# Builds the Docker image on GitHub's runners (plenty of RAM, full logs) and
# publishes it to GitHub Container Registry so the VPS can just pull it.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Diagnose npm ci in node:22-slim
        run: |
          docker run --rm -v "${{ github.workspace }}":/app -w /app node:22-slim bash -lc 'apt-get update >/dev/null 2>&1 && apt-get install -y --no-install-recommends openssl ca-certificates >/dev/null 2>&1; rm -rf node_modules; npm ci 2>&1 | tail -n 60' > diag.txt 2>&1 || true
          echo "===DIAG==="; cat diag.txt
          echo "::error::DIAG $(tail -c 1500 diag.txt | tr '\n' '~' | tr '"' ' ')"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/nicogit1976/mydashboard:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
