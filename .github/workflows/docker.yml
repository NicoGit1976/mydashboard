name: build-image

# Builds the Docker image on GitHub's runners (plenty of RAM, full logs) and
# publishes it to GitHub Container Registry so the VPS can just pull it.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  # next.config.ts sets typescript.ignoreBuildErrors, so the image build alone
  # would happily ship code that doesn't typecheck. Gate on tsc explicitly:
  # a failure here means no image is published at all.
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install --no-audit --no-fund
      - run: npx prisma generate
      - run: npx tsc --noEmit

  build:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Immutable per-commit tag alongside :latest so a bad deploy can be
          # rolled back by pinning the compose image to the last good sha.
          tags: |
            ghcr.io/nicogit1976/mydashboard:latest
            ghcr.io/nicogit1976/mydashboard:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
